<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self'; object-src 'none';">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="left-panel">
            <div class="overlay">
                <img src="scatlogo.png" class="logo" alt="logo">
            </div>
        </div>

        <div class="right-panel">
            <h1>WELCOME</h1>
            <p>Log in to your account to continue</p>

            <form action="login-function.php" method="POST">
                <div class="input-group">
                    <label for="username" style="display:none;">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username or email"
                        autocomplete="username" required>
                </div>

                <div class="input-group">
                    <label for="password" style="display:none;">Password</label>
                    <input type="password" name="password" autocomplete="current-password" placeholder="Enter password"
                        id="password" required>
                    <button type="button" id="togglePasswordBtn" class="toggle-password" aria-label="Show password">
                        <i class="fa fa-eye"></i>
                    </button>
                </div>

                <a href="forgot.php" class="forgot">Forgot your password?</a>

                <div class="btn-container">
                    <button type="submit" class="login-btn">Log in</button>
                </div>
            </form>
            <p style="margin-top: 25px;">
                Don't have an account? <a href="signup.php">Sign up here!</a>
            </p>
        </div>
    </div>
    <script src="login.js" defer></script>
</body>

</html>
